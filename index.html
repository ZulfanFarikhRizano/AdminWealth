<style>
:root {
  --bg: #02040a;
  --s1: #060c18;
  --s2: #091220;
  --s3: #0d1928;
  --border: #0f2038;

  --accent: #00d4ff;

  --accent3: #00ffb3;
  --green: #00e5a0;
  --red: #ff4d6d;
  --yellow: #fbbf24;
  --orange: #fb923c;
  --text: #e2f0ff;
  --muted: #2d4a6e;
  --muted2: #4d6e90;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Inter', sans-serif;
  --sans2: 'Inter', sans-serif;
  --glow: 0 0 30px rgba(0,212,255,0.2);
  --glow2: 0 0 60px rgba(0,212,255,0.08);
  --radius: 14px;
  --radius-sm: 8px;
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans2);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── NOISE TEXTURE overlay ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 9998;
  opacity: 0.4;
}

/* Scanline */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.025) 3px, rgba(0,0,0,0.025) 4px);
  pointer-events: none;
  z-index: 9997;
}

/* ── PASSWORD GATE ── */
#passwordGate {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 99999;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 0;
}

#passwordGate::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: 
    radial-gradient(ellipse 60% 50% at 50% -10%, rgba(0,212,255,0.12) 0%, transparent 70%),
    radial-gradient(ellipse 40% 40% at 80% 80%, rgba(109,40,217,0.08) 0%, transparent 60%);
  pointer-events: none;
}

.gate-logo {
  font-family: var(--sans);
  font-size: 2.2rem;
  font-weight: 800;
  letter-spacing: -0.04em;
  margin-bottom: 4px;
  position: relative;
}

.gate-logo .z { color: var(--accent); }

.gate-sub {
  font-family: var(--mono);
  font-size: 0.6rem;
  color: var(--muted2);
  text-transform: uppercase;
  letter-spacing: 0.25em;
  margin-bottom: 52px;
  position: relative;
}

.gate-box {
  background: rgba(6,12,24,0.8);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 40px;
  width: 100%;
  max-width: 380px;
  position: relative;
  backdrop-filter: blur(20px);
  box-shadow: 0 0 0 1px rgba(0,212,255,0.05), 0 40px 80px rgba(0,0,0,0.5);
}

.gate-box::before {
  content: '';
  position: absolute;
  top: 0; left: 20%; right: 20%;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(0,212,255,0.4), transparent);
}

.gate-label {
  font-family: var(--mono);
  font-size: 0.58rem;
  color: var(--muted2);
  text-transform: uppercase;
  letter-spacing: 0.15em;
  margin-bottom: 12px;
}

.gate-input {
  width: 100%;
  background: var(--s2);
  border: 1px solid var(--border2);
  color: var(--text);
  font-family: var(--mono);
  font-size: 1rem;
  letter-spacing: 0.1em;
  padding: 14px 16px;
  border-radius: 10px;
  outline: none;
  transition: all 0.2s;
  margin-bottom: 16px;
}

.gate-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(0,212,255,0.1);
}

.gate-input::placeholder { color: var(--muted); }

.gate-btn {
  width: 100%;
  background: linear-gradient(135deg, rgba(0,212,255,0.15), rgba(109,40,217,0.15));
  border: 1px solid rgba(0,212,255,0.3);
  color: var(--accent);
  font-family: var(--sans);
  font-size: 0.85rem;
  font-weight: 700;
  letter-spacing: 0.05em;
  padding: 13px;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.2s;
  text-transform: uppercase;
}

.gate-btn:hover {
  background: linear-gradient(135deg, rgba(0,212,255,0.25), rgba(109,40,217,0.25));
  border-color: var(--accent);
  box-shadow: 0 0 20px rgba(0,212,255,0.2);
}

.gate-error {
  color: var(--red);
  font-family: var(--mono);
  font-size: 0.7rem;
  text-align: center;
  margin-top: 12px;
  opacity: 0;
  transition: opacity 0.2s;
}

.gate-error.show { opacity: 1; }

.gate-lock {
  text-align: center;
  margin-bottom: 28px;
}

.gate-lock-icon {
  font-size: 2.5rem;
  display: block;
  margin-bottom: 8px;
  filter: drop-shadow(0 0 12px rgba(0,212,255,0.5));
}

.gate-lock-text {
  font-family: var(--sans);
  font-weight: 700;
  font-size: 1.1rem;
  color: var(--text);
}

.gate-lock-sub {
  font-family: var(--mono);
  font-size: 0.62rem;
  color: var(--muted2);
  margin-top: 4px;
}

/* Animation for wrong password */
@keyframes shake {
  0%,100% { transform: translateX(0); }
  20% { transform: translateX(-8px); }
  40% { transform: translateX(8px); }
  60% { transform: translateX(-6px); }
  80% { transform: translateX(6px); }
}

.shake { animation: shake 0.4s ease; }

/* ── SIDEBAR ── */
.sidebar {

.sidebar::after {

}

.sidebar-logo {

}

.nav-section {

.nav-item {
  display: flex;

}

.nav-item:hover {

}

.nav-item.active {
  background: linear-gradient(135deg, rgba(0,212,255,0.1), rgba(109,40,217,0.08));
  color: var(--accent);

}

.nav-item.active::before {
  content: '';
  position: absolute;
  left: 0; top: 20%; bottom: 20%;

}

.nav-icon {
  font-size: 0.9rem;
  width: 20px;
  text-align: center;
  flex-shrink: 0;
}

.sidebar-footer {
  padding: 18px 20px;
  border-top: 1px solid var(--border);
  font-family: var(--mono);
  font-size: 0.6rem;
  color: var(--muted);
  background: rgba(0,0,0,0.2);
}

.live-dot {
  display: inline-block;
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--green);
  margin-right: 7px;

  box-shadow: 0 0 6px var(--green);
}

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ── MAIN ── */
.main {
  margin-left: 230px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  background: var(--bg);
}

/* ── TOPBAR ── */
.topbar {
  position: sticky;
  top: 0;
  background: rgba(2,4,10,0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 32px;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  z-index: 50;
  box-shadow: 0 1px 0 rgba(0,212,255,0.05);
}

.page-title {
  font-size: 0.92rem;

}

}

}

.refresh-btn {
  display: flex;

  border-radius: var(--radius-sm);
  font-family: var(--sans2);
  font-size: 0.78rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.18s;
  letter-spacing: -0.01em;
}

.refresh-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  box-shadow: 0 0 12px rgba(0,212,255,0.15);
}

.refresh-btn:disabled { opacity: 0.4; cursor: not-allowed; }

.total-badge {
  font-family: var(--mono);
  font-size: 0.68rem;
  background: linear-gradient(135deg, rgba(0,212,255,0.1), rgba(109,40,217,0.08));
  color: var(--accent);
  border: 1px solid rgba(0,212,255,0.2);
  padding: 6px 14px;
  border-radius: 20px;
  font-weight: 500;
}

/* ── CONTENT ── */
.content {
  padding: 28px 32px;
  flex: 1;
}

/* Pages */
.page { display: none; }
.page.active { display: block; }

/* ── STAT CARDS ── */
.stats-row {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 14px;
  margin-bottom: 24px;
}

.stat-card {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 16px 16px;
  position: relative;
  overflow: visible;
  transition: all 0.2s;
  min-width: 0;
}

.stat-card:hover {
  border-color: var(--border2);
  box-shadow: 0 4px 24px rgba(0,0,0,0.3), 0 0 0 1px rgba(0,212,255,0.05);
  transform: translateY(-1px);
}

.stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 15%; right: 15%;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent-color, var(--accent)), transparent);
  opacity: 0.6;
}

.stat-card::after {
  content: '';
  position: absolute;
  bottom: 0; right: 0;
  width: 80px; height: 80px;
  background: radial-gradient(ellipse at right bottom, rgba(var(--accent-rgb, 0,212,255),0.06), transparent 70%);
  pointer-events: none;
}

.stat-label {
  font-size: 0.56rem;
  color: var(--muted2);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  font-family: var(--mono);
  margin-bottom: 10px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.stat-value {
  font-family: 'Inter', sans-serif;
  font-size: clamp(1.4rem, 3vw, 2rem);
  font-weight: 800;
  color: var(--text);
  line-height: 1.1;
  letter-spacing: -0.04em;
  word-break: break-all;
  overflow-wrap: break-word;
}

.stat-sub {
  font-size: 0.66rem;
  color: var(--muted2);
  margin-top: 8px;
  font-family: var(--mono);
}

.stat-icon {
  position: absolute;
  top: 18px; right: 18px;
  font-size: 1.2rem;
  opacity: 0.12;
}

/* ── TABLE ── */
.table-card {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 24px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.2);
}
  margin-bottom: 24px;
}

.table-header {
  padding: 18px 22px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
  background: rgba(0,0,0,0.15);
}

.table-title {
  font-size: 0.82rem;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--sans);
  letter-spacing: -0.02em;
}

.count-badge {
  font-family: var(--mono);
  font-size: 0.6rem;
  background: var(--s3);
  border: 1px solid var(--border2);
  color: var(--muted2);
  padding: 3px 9px;
  border-radius: 20px;
}

.search-input {
  background: var(--s2);
  border: 1px solid var(--border2);
  color: var(--text);
  font-family: var(--mono);
  font-size: 0.72rem;
  padding: 8px 14px;
  border-radius: var(--radius-sm);
  outline: none;
  width: 210px;
  transition: all 0.18s;
}

.search-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(0,212,255,0.1);
}

.search-input::placeholder { color: var(--muted); }

table {
  width: 100%;
  border-collapse: collapse;
}

th {
  padding: 11px 18px;
  text-align: left;
  font-size: 0.58rem;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--muted2);
  font-family: var(--mono);
  font-weight: 500;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
  background: rgba(0,0,0,0.1);
}

td {
  padding: 13px 18px;
  font-size: 0.79rem;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}

tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(0,212,255,0.025); }

.mono { font-family: var(--mono); }
.green { color: var(--green); }
.red { color: var(--red); }
.yellow { color: var(--yellow); }
.accent { color: var(--accent); }
.muted { color: var(--muted2); }

/* User row */
.user-seed {
  font-family: var(--mono);
  font-size: 0.66rem;
  color: var(--accent);
  max-width: 130px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  background: rgba(0,212,255,0.06);
  padding: 2px 7px;
  border-radius: 4px;
  border: 1px solid rgba(0,212,255,0.1);
}

.expand-btn {
  background: var(--s2);
  border: 1px solid var(--border2);
  color: var(--muted2);
  padding: 5px 12px;
  border-radius: var(--radius-sm);
  font-size: 0.68rem;
  cursor: pointer;
  transition: all 0.18s;
  font-family: var(--mono);
}

.expand-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  box-shadow: 0 0 10px rgba(0,212,255,0.1);
}

/* User detail drawer */
.detail-row td {
  padding: 0;
  background: var(--s2);
}

.detail-inner {
  padding: 22px;
  display: none;
  border-top: 1px solid var(--border);
}

.detail-inner.open { display: block; }

.detail-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 16px;
}

.detail-stat {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 13px 15px;
}

.detail-stat-label {
  font-size: 0.57rem;
  color: var(--muted2);
  font-family: var(--mono);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 5px;
}

.detail-stat-val {
  font-family: var(--sans);
  font-size: 0.95rem;
  font-weight: 800;
  letter-spacing: -0.02em;
}

.mini-table { width: 100%; border-collapse: collapse; font-size: 0.72rem; }
.mini-table th { padding: 7px 10px; font-size: 0.57rem; color: var(--muted2); border-bottom: 1px solid var(--border); font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.1em; }
.mini-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); font-family: var(--mono); }

.mini-tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 12px;
}

.mini-tab {
  padding: 5px 14px;
  border-radius: 20px;
  font-size: 0.65rem;
  font-family: var(--mono);
  cursor: pointer;
  background: var(--s1);
  border: 1px solid var(--border);
  color: var(--muted2);

.mini-tab.active {

  border-color: rgba(0,212,255,0.25);
}

/* Pills */
.pill {
  display: inline-block;
  padding: 3px 9px;
  border-radius: 20px;
  font-family: var(--mono);
  font-size: 0.6rem;
  font-weight: 600;
  letter-spacing: 0.03em;
}

.pill-green { background: rgba(0,229,160,0.1); color: var(--green); border: 1px solid rgba(0,229,160,0.15); }
.pill-red { background: rgba(255,77,109,0.1); color: var(--red); border: 1px solid rgba(255,77,109,0.15); }
.pill-yellow { background: rgba(251,191,36,0.1); color: var(--yellow); border: 1px solid rgba(251,191,36,0.15); }
.pill-blue { background: rgba(0,212,255,0.08); color: var(--accent); border: 1px solid rgba(0,212,255,0.15); }
.pill-purple { background: rgba(109,40,217,0.12); color: #a78bfa; border: 1px solid rgba(109,40,217,0.2); }

/* Loading */

  display: flex;
  align-items: center;
  justify-content: center;
  padding: 70px;
  flex-direction: column;
  gap: 16px;
  color: var(--muted2);
  font-family: var(--mono);
  font-size: 0.75rem;
}

.spinner {
